# InMemory stores — no database SQL executed even though H2 is configured.
# Reactive InMemory stores are listed explicitly so that consumers enabling
# casehub.qhorus.reactive.enabled=true see the correct pattern: without this listing,
# ReactiveJpaChannelStore wins over InMemoryReactiveChannelStore when both are active.
# Refs claudony#155, qhorus#282, qhorus#288.
quarkus.arc.selected-alternatives=\
  io.casehub.qhorus.persistence.memory.InMemoryChannelStore,\
  io.casehub.qhorus.persistence.memory.InMemoryMessageStore,\
  io.casehub.qhorus.persistence.memory.InMemoryInstanceStore,\
  io.casehub.qhorus.persistence.memory.InMemoryDataStore,\
  io.casehub.qhorus.persistence.memory.InMemoryCommitmentStore,\
  io.casehub.qhorus.persistence.memory.InMemoryWatchdogStore,\
  io.casehub.qhorus.persistence.memory.InMemoryDeliveryCursorStore,\
  io.casehub.qhorus.persistence.memory.InMemoryChannelBindingStore,\
  io.casehub.qhorus.persistence.memory.InMemoryCrossTenantChannelStore,\
  io.casehub.qhorus.persistence.memory.InMemoryCrossTenantMessageStore,\
  io.casehub.qhorus.persistence.memory.InMemoryCrossTenantCommitmentStore,\
  io.casehub.qhorus.persistence.memory.InMemoryCrossTenantWatchdogStore,\
  io.casehub.qhorus.persistence.memory.InMemoryReactiveChannelStore,\
  io.casehub.qhorus.persistence.memory.InMemoryReactiveMessageStore,\
  io.casehub.qhorus.persistence.memory.InMemoryReactiveInstanceStore,\
  io.casehub.qhorus.persistence.memory.InMemoryReactiveDataStore,\
  io.casehub.qhorus.persistence.memory.InMemoryReactiveCommitmentStore,\
  io.casehub.qhorus.persistence.memory.InMemoryChannelMembershipStore,\
  io.casehub.qhorus.persistence.memory.InMemoryReactiveChannelMembershipStore,\
  io.casehub.qhorus.persistence.memory.InMemorySpaceStore,\
  io.casehub.qhorus.persistence.memory.InMemoryReactiveSpaceStore

# H2 — satisfies Quarkus/Hibernate boot requirements
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:type-system;DB_CLOSE_DELAY=-1
quarkus.datasource.qhorus.db-kind=h2
quarkus.datasource.qhorus.username=sa
quarkus.datasource.qhorus.password=
quarkus.datasource.qhorus.jdbc.url=jdbc:h2:mem:type-system;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.packages=io.casehub.qhorus.runtime.config
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.qhorus.database.generation=drop-and-create
quarkus.flyway.qhorus.migrate-at-start=false
# Create ledger_subject_sequence used by QhorusSequenceAllocator (not a JPA entity). Refs #256.
quarkus.hibernate-orm.qhorus.sql-load-script=import-qhorus-test.sql
casehub.ledger.enabled=true

quarkus.http.test-port=0

# Exclude beans with unsatisfied deps from casehub-ledger SNAPSHOT
quarkus.arc.exclude-types=io.casehub.ledger.runtime.service.identity.ReactiveAgentIdentityVerificationService
