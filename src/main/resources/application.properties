# Qhorus — Agent Communication Mesh
# Mode: local (H2) or remote (PostgreSQL via DATABASE_URL env var)

quarkus.application.name=qhorus
quarkus.http.port=7779

# --- Database ---
# Local: H2 in-memory (dev/test) or file-based (persistent local)
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:file:~/.qhorus/qhorus.db;DB_CLOSE_ON_EXIT=FALSE
%dev.quarkus.hibernate-orm.database.generation=update

%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:qhorus-test
%test.quarkus.hibernate-orm.database.generation=drop-and-create

# Remote: PostgreSQL (set DATABASE_URL env var on Railway/prod)
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.hibernate-orm.database.generation=update

# --- Cleanup ---
qhorus.cleanup.stale-instance-seconds=120
qhorus.cleanup.data-retention-days=7

# --- MCP ---
quarkus.mcp.server.traffic-log.enabled=false
