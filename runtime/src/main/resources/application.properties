# Qhorus extension default configuration
# Consuming applications override these as needed.
# Datasource (quarkus.datasource.*) must be configured by the consuming app.

# Stale instance detection threshold
quarkus.qhorus.cleanup.stale-instance-seconds=120

# Data retention (days before old messages/data are purged)
quarkus.qhorus.cleanup.data-retention-days=7

# PendingReply expiry cleanup interval
quarkus.qhorus.cleanup.pending-reply-check-seconds=60

# MCP server traffic logging (off by default — verbose in dev)
quarkus.mcp.server.traffic-log.enabled=false
