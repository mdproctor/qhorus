# Index casehub-connectors-slack-bot so SlackBotClient (@ApplicationScoped) is discovered as a CDI bean
quarkus.index-dependency.slack-bot.group-id=io.casehub
quarkus.index-dependency.slack-bot.artifact-id=casehub-connectors-slack-bot

quarkus.arc.selected-alternatives=\
  io.casehub.qhorus.testing.InMemoryChannelStore,\
  io.casehub.qhorus.testing.InMemoryMessageStore,\
  io.casehub.qhorus.testing.InMemoryInstanceStore,\
  io.casehub.qhorus.testing.InMemoryDataStore,\
  io.casehub.qhorus.testing.InMemoryCommitmentStore,\
  io.casehub.qhorus.testing.InMemoryWatchdogStore

quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:slack-test;DB_CLOSE_DELAY=-1

quarkus.datasource.qhorus.db-kind=h2
quarkus.datasource.qhorus.username=sa
quarkus.datasource.qhorus.password=
quarkus.datasource.qhorus.jdbc.url=jdbc:h2:mem:slack-test;DB_CLOSE_DELAY=-1
quarkus.datasource.qhorus.reactive=false

quarkus.hibernate-orm.packages=io.casehub.qhorus.runtime.config
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.qhorus.datasource=qhorus
quarkus.hibernate-orm.qhorus.packages=io.casehub.qhorus.runtime,io.casehub.ledger.runtime,io.casehub.qhorus.slack
quarkus.hibernate-orm.qhorus.database.generation=drop-and-create
quarkus.flyway.qhorus.migrate-at-start=false
quarkus.hibernate-orm.qhorus.sql-load-script=import-slack-test.sql

casehub.ledger.enabled=true
casehub.qhorus.delivery.enabled=false

# Dummy Slack credential for tests
casehub.credentials.T_TEST=xoxb-test-token

quarkus.http.test-port=0
